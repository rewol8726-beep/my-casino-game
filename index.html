<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Casino Auto-Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0f0f0f; color: white; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #333; }
        .balance-value { color: #FFD700; font-size: 28px; font-weight: bold; }
        .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .slot-container { background: #1a1a1a; padding: 25px; border-radius: 25px; border: 3px solid #333; text-align: center; width: 100%; max-width: 400px; }
        .slots-wrapper { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .slot-window { width: 80px; height: 100px; background: #000; border-radius: 12px; border: 2px solid #444; overflow: hidden; position: relative; }
        .slot-strip { display: flex; flex-direction: column; align-items: center; position: absolute; width: 100%; top: 0; }
        .symbol { width: 80px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 50px; flex-shrink: 0; }
        .spinning { animation: spin-anim 0.2s linear infinite; filter: blur(3px); }
        @keyframes spin-anim { 0% { transform: translateY(0); } 100% { transform: translateY(-200px); } }
        .bet-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .bet-btn { background: #222; border: 1px solid #444; color: white; padding: 12px 5px; border-radius: 10px; cursor: pointer; }
        .bet-btn.active { background: #FFD700; color: black; font-weight: bold; }
        .all-in { grid-column: span 3; background: #d9534f; border: none; }
        .spin-btn { width: 100%; background: #FFD700; color: black; border: none; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .spin-btn:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 12px; color: #888;">–Т–Р–® –С–Р–Ы–Р–Э–°</div>
    <div class="balance-value"><span id="balance">0</span> рЯ™Щ</div>
</div>

<div class="content">
    <div class="slot-container">
        <div class="slots-wrapper">
            <div class="slot-window"><div id="s1" class="slot-strip"></div></div>
            <div class="slot-window"><div id="s2" class="slot-strip"></div></div>
            <div class="slot-window"><div id="s3" class="slot-strip"></div></div>
        </div>
        <div class="bet-container">
            <button class="bet-btn active" onclick="setBet(100, this)">100</button>
            <button class="bet-btn" onclick="setBet(500, this)">500</button>
            <button class="bet-btn" onclick="setBet(1000, this)">1k</button>
            <button class="bet-btn" onclick="setBet(10000, this)">10k</button>
            <button class="bet-btn all-in" onclick="setAllIn(this)">ALL IN</button>
        </div>
        <button id="spinBtn" class="spin-btn" onclick="startSpin()">–Ъ–†–£–Ґ–Ш–Ґ–ђ</button>
    </div>
</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SERVER_URL = "https://casino-backen-production.up.railway.app"; 
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

    let balance = 0;
    let currentBet = 100;
    const icons = ['рЯНТ', 'рЯТО', '7пЄПвГ£', 'рЯНЛ', 'рЯФФ', 'в≠Р'];

    async function loadBalance() {
        if (!userId) {
            document.getElementById('balance').innerText = "Open in TG";
            return;
        }
        try {
            const response = await fetch(`${SERVER_URL}/get_balance?user_id=${userId}`);
            const data = await response.json();
            if (data.balance !== undefined) {
                balance = data.balance;
                document.getElementById('balance').innerText = balance.toLocaleString();
            }
        } catch (e) {
            document.getElementById('balance').innerText = "Error";
        }
    }

    async function syncBalance() {
        if (!userId) return;
        try {
            await fetch(`${SERVER_URL}/update_balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, balance: balance })
            });
        } catch (e) { console.error("Sync error"); }
    }

    function updateDisplay() {
        document.getElementById('balance').innerText = balance.toLocaleString();
        syncBalance(); 
    }

    // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–∞—Ж–Є—П –±–∞—А–∞–±–∞–љ–Њ–≤ –њ—А–Є –Ј–∞–њ—Г—Б–Ї–µ
    function initSlots() {
        const strips = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        strips.forEach(strip => {
            strip.innerHTML = `<div class="symbol">${icons[Math.floor(Math.random() * icons.length)]}</div>`;
        });
    }

    function setBet(amount, btn) {
        currentBet = amount;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setAllIn(btn) {
        currentBet = balance;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function startSpin() {
        if (balance < currentBet || currentBet <= 0) return alert("–Э–µ–і–Њ—Б—В–∞—В–Њ—З–љ–Њ –Љ–Њ–љ–µ—В!");
        
        balance -= currentBet;
        updateDisplay();
        
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        
        const strips = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        const results = [];

        strips.forEach((strip, index) => {
            // –У–µ–љ–µ—А–Є—А—Г–µ–Љ —Д–Є–љ–∞–ї—М–љ—Л–є —Б–Є–Љ–≤–Њ–ї
            const finalIcon = icons[Math.floor(Math.random() * icons.length)];
            results[index] = finalIcon;

            // –°–Њ–Ј–і–∞–µ–Љ "–ї–µ–љ—В—Г" –і–ї—П –∞–љ–Є–Љ–∞—Ж–Є–Є (—Б–≤–µ—А—Е—Г —В–µ–Ї—Г—Й–Є–є —Б–Є–Љ–≤–Њ–ї, —Б–љ–Є–Ј—Г - –Ї—Г—З–∞ —Б–ї—Г—З–∞–є–љ—Л—Е, –≤ –Ї–Њ–љ—Ж–µ - –љ–Њ–≤—Л–є —А–µ–Ј—Г–ї—М—В–∞—В)
            const currentIcon = strip.innerText;
            strip.innerHTML = '';
            
            // –Ф–Њ–±–∞–≤–ї—П–µ–Љ —В–µ–Ї—Г—Й–Є–є (—З—В–Њ–±—Л –љ–µ –±—Л–ї–Њ –њ—А—Л–ґ–Ї–∞ –≤ –љ–∞—З–∞–ї–µ)
            const startSym = document.createElement('div');
            startSym.className = 'symbol';
            startSym.innerText = currentIcon;
            strip.appendChild(startSym);

            // –Ф–Њ–±–∞–≤–ї—П–µ–Љ 15 —Б–ї—Г—З–∞–є–љ—Л—Е "–њ—А–Њ–ї–µ—В–Њ–Ї"
            for(let i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = icons[Math.floor(Math.random() * icons.length)];
                strip.appendChild(s);
            }

            // –Ф–Њ–±–∞–≤–ї—П–µ–Љ —Д–Є–љ–∞–ї—М–љ—Л–є —Б–Є–Љ–≤–Њ–ї
            const endSym = document.createElement('div');
            endSym.className = 'symbol';
            endSym.innerText = finalIcon;
            strip.appendChild(endSym);

            // –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ –∞–љ–Є–Љ–∞—Ж–Є—О —Б–Љ–µ—Й–µ–љ–Є—П –≤–≤–µ—А—Е
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0)';
            
            // –§–Њ—А—Б–Є—А—Г–µ–Љ –њ–µ—А–µ—А–Є—Б–Њ–≤–Ї—Г
            strip.offsetHeight; 

            // –†–∞—Б—Б—З–Є—В—Л–≤–∞–µ–Љ —Б–Љ–µ—Й–µ–љ–Є–µ (–Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ —Б–Є–Љ–≤–Њ–ї–Њ–≤ - 1) * 100px
            const offset = (strip.children.length - 1) * 100;
            strip.style.transition = `transform ${1 + index * 0.5}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
            strip.style.transform = `translateY(-${offset}px)`;

            // –Ъ–Њ–≥–і–∞ –∞–љ–Є–Љ–∞—Ж–Є—П –Ї–Њ–љ–Ї—А–µ—В–љ–Њ–≥–Њ –±–∞—А–∞–±–∞–љ–∞ –Ї–Њ–љ—З–Є–ї–∞—Б—М
            setTimeout(() => {
                strip.style.transition = 'none';
                strip.innerHTML = `<div class="symbol">${finalIcon}</div>`;
                strip.style.transform = 'translateY(0)';
                
                if (index === 2) {
                    setTimeout(() => {
                        checkWin(results[0], results[1], results[2]);
                        btn.disabled = false;
                    }, 300);
                }
            }, 1000 + (index * 500));
        });
    }

    function checkWin(a, b, c) {
        if (a === b && b === c) {
            let win = (a === 'рЯТО') ? currentBet * 50 : currentBet * 10;
            balance += win;
            alert("рЯФ• –Я–Ю–С–Х–Ф–Р! +" + win);
        } else if (a === b || b === c || a === c) {
            let halfWin = Math.floor(currentBet * 0.5);
            balance += halfWin;
            // –Ь–Њ–ґ–љ–Њ –і–Њ–±–∞–≤–Є—В—М —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ –Њ –Љ–∞–ї–Њ–Љ –≤—Л–Є–≥—А—Л—И–µ
        }
        updateDisplay();
    }

    loadBalance();
    initSlots();
  </script>
