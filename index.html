<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Casino Pro</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Верхняя панель */
        .header { 
            background: #1e1e1e; 
            padding: 20px; 
            text-align: center; 
            font-size: 20px; 
            border-bottom: 1px solid #333;
        }

        .balance-value { 
            color: #FFD700; 
            font-size: 32px; 
            font-weight: bold; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Основной контент */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .section { display: none; width: 100%; text-align: center; }
        .section.active { display: block; }

        /* Стили Кошелька */
        .wallet-card {
            background: linear-gradient(145deg, #1e1e1e, #252525);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 80%;
        }

        /* Стили Казино */
        .slot-machine {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #333;
            display: flex;
            gap: 10px;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 30px;
        }

        .btn-spin {
            background: #FFD700;
            color: black;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
        }

        /* Нижнее меню */
        .nav-bar {
            background: #1e1e1e;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .nav-item.active {
            color: #FFD700;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="header">МОЙ СЧЕТ</div>

<div class="content">
    <div id="wallet" class="section active">
        <div class="wallet-card">
            <div style="color: #888; margin-bottom: 10px;">Доступно для игры</div>
            <div class="balance-value"><span id="balance">0</span> 🪙</div>
        </div>
    </div>

    <div id="casino" class="section">
        <div class="slot-machine">
            <div id="s1">🎲</div>
            <div id="s2">🎲</div>
            <div id="s3">🎲</div>
        </div>
        <button class="btn-spin" onclick="spin()">КРУТИТЬ (100)</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="showSection('wallet')">
        <div class="nav-icon">💰</div>
        <span>ДЕНЬГИ</span>
    </div>
    <div class="nav-item" id="nav-casino" onclick="showSection('casino')">
        <div class="nav-icon">🎰</div>
        <span>КАЗИНО</span>
    </div>
</div>

<script>
    // Начальный баланс 15.000
    let balance = parseInt(localStorage.getItem('balance'));
    if (isNaN(balance)) balance = 15000;
    
    document.getElementById('balance').innerText = balance.toLocaleString();

    function updateBalance(amount) {
        balance += amount;
        document.getElementById('balance').innerText = balance.toLocaleString();
        localStorage.setItem('balance', balance);
    }

    function showSection(id) {
        // Скрываем всё
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // Показываем нужное
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        
        // Меняем заголовок
        const titles = { 'wallet': 'МОЙ СЧЕТ', 'casino': 'ИГРОВЫЕ АВТОМАТЫ' };
        document.querySelector('.header').innerText = titles[id];
    }

    const icons = ['🍒', '🍋', '💎', '7️⃣', '🔔', '🍎'];
    
    function spin() {
        if (balance < 100) {
            alert("Недостаточно средств!");
            return;
        }
        
        updateBalance(-100);

        const slot1 = icons[Math.floor(Math.random() * icons.length)];
        const slot2 = icons[Math.floor(Math.random() * icons.length)];
        const slot3 = icons[Math.floor(Math.random() * icons.length)];

        document.getElementById('s1').innerText = slot1;
        document.getElementById('s2').innerText = slot2;
        document.getElementById('s3').innerText = slot3;

        if (slot1 === slot2 && slot2 === slot3) {
            alert("ВЫИГРЫШ! +2000");
            updateBalance(2000);
        }
    }
</script>

</body>
</html>
