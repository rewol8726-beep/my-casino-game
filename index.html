<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Slots</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        .slot-container {
            background: #333;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            margin-bottom: 30px;
        }
        #slots {
            font-size: 60px;
            letter-spacing: 10px;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(180deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px #999;
        }
        button:active {
            box-shadow: 0 2px #666;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <h1>🎰 СЛОТЫ 🎰</h1>

    <div class="slot-container">
        <div id="slots">🍒 🍋 🍇</div>
    </div>

    <button onclick="spin()">КРУТИТЬ!</button>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        const symbols = ['🍒', '🍋', '🍇', '💎', '7️⃣', '🔔'];

        function spin() {
            // Вибрация при нажатии (если поддерживается)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            const slotElement = document.getElementById('slots');
            
            // Простая анимация "кручения" (быстрая смена символов)
            let count = 0;
            const interval = setInterval(() => {
                let s1 = symbols[Math.floor(Math.random() * symbols.length)];
                let s2 = symbols[Math.floor(Math.random() * symbols.length)];
                let s3 = symbols[Math.floor(Math.random() * symbols.length)];
                slotElement.innerText = `${s1} ${s2} ${s3}`;
                count++;
                
                if (count > 10) {
                    clearInterval(interval);
                    checkWin(s1, s2, s3);
                }
            }, 50);
        }

        function checkWin(s1, s2, s3) {
            if (s1 === s2 && s2 === s3) {
                tg.showAlert("ДЖЕКПОТ! 🎉");
            }
        }
    </script>
</body>
</html>
